name: Publish Statistical Report

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 9 28 * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: make test

      - name: Build report
        run: make report

      - name: Publish report as site index
        run: cp outputs/statistical_summary.html outputs/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
